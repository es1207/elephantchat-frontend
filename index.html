<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title><title标题>AI聊天</title标题>

<style>
body { font-family: Arial; background: #f5f5f5; }
#chat {
    width: 500px;
    height: 500px;
    margin: auto;
    background: white;背景: 白色;
    overflow-y: scroll;溢出-y: 滚动;
    padding: 10px;内边距: 10像素;
    border-radius: 10px;
}
.msg {.消息 {.消息 {.消息 {
    margin: 10px 0;
    padding: 10px;内边距: 10像素;
    border-radius: 10px;
    max-width: 70%;最大宽度: 70%;
}
.user { background: #4CAF50; color: white; margin-left: auto; }
.ai { background: #e0e0e0; }

#input-area {
    width: 500px;
    margin: 10px auto;
    display: flex;
}
input { flex: 1; height: 40px; }
button { width: 80px; }
</style>
</head>

<body>

<div style="text-align:center;">
    <input id="username" placeholder="用户名">
    <button onclick="login()">登录</button>
    <button onclick="clearChat()">清空</button>
</div>

<div id="chat"></div>

<div id="input-area">
    <input id="msg">
    <button onclick="send()">发送</button>
</div>

<script>

let user_id = localStorage.getItem("user_id");

function login() {
    let username = document.getElementById("username").value;

    fetch("https://elephantchat-production.up.railway.app/login?username=" + username)
    .then(res => res.json())
    .then(data => {    .然后(data => {
        if (data.code === 0) {
            user_id = data.data.user_id;
            localStorage.setItem("user_id", user_id);
            alert("登录成功");
        }
    });
}

function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
}

function send() {
    let msg = document.getElementById("msg").value;

    if (!msg || !user_id) {
        alert("请先登录");
        return;
    }

    addMessage("你：" + msg, "user");

    fetch("https://elephantchat-production.up.railway.app/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            msg: msg,消息: 消息,
            user_id: user_id用户ID: 用户ID
        })
    })
    .then(res => res.json())    .然后(res => res.json())    .然后(res回复 => res回复.json())    .然后(res回复 => res回复.json())
    .then(data => {    .然后(data => {
        if (data.code === 0) {如果 (data.code === 0) {
            addMessage("AI：" + data.data.reply, "ai");
        } else {
            addMessage("❌ " + data.msg, "ai");
        }
    });

    document.getElementById("msg").value = "";
}

function clearChat() {
    fetch("https://elephantchat-production.up.railway.app/clear?user_id=" + user_id)
    .then(() => {
        document.getElementById("chat").innerHTML = "";
    });
}

</script>

</body>
</html>
